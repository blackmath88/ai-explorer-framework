<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Explorer Framework</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>AI Explorer Framework</h1>
      <p>JSON-driven framework viewer (static, vanilla HTML/CSS/JS).</p>
    </header>

    <main class="layout">
      <section>
        <h2>Framework Overview</h2>
        <div id="framework-overview" class="card"></div>
      </section>

      <section>
        <h2>Framework Map</h2>
        <div id="framework-map" class="card"></div>
      </section>

      <section>
        <h2>Glossary</h2>
        <div id="glossary" class="card"></div>
      </section>
    </main>

    <footer class="site-footer">
      <small>Data source: <code>/docs/data/*.json</code></small>
    </footer>

    <script src="./app.js" defer></script>
  </body>
</html>
